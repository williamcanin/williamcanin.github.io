# Rawfeed - Blog Page Content & Texts

# section: [blog]
blog:
  subtitle: "posts"
  search:
    enable: true
    placeholder: "Pesquise aqui ou pressione Esc para sair."
    button_clean:
      text: "limpar"
    results: "resultados"
    no_results: "Nenhum resultado encontrado"
  pagination:
    newer_text: "recentes"
    counter: ["página", "de"]
    older_text: "velhos"
  post:
    reading_time:
      enable: true
      words_per_minute: 180
      message:
        ["Leia aproximadamente em", "Leia em menos de"]
      minutes_label: ["minuto", "minutos"]
    author: "Postado por"
    related_posts:
      enable: true
      title: "postagens relacionadas"
    updated_on: "Página atualizada em"
    comments:
      title: "comentários"
      provider: "giscus" # choose between. options: giscus | disqus.
      giscus:
        repo: "williamcanin/williamcanin.github.io" # your repository, e.g: username/repo-name
        repo_id: "MDEwOlJlcG9zaXRvcnk0MDMyOTUzOQ==" # copied from giscus.app, e.g: R_kgD...
        repo_category: "Comments" # copied category name GitHub
        category_id: "DIC_kwDOAmdhQ84CwLFu" # copied from giscus.app, e.g: DIC_kwD...
        mapping: "pathname"
        reactions_enabled: 1
        theme: "light" # initial theme. default: light
        theme_light: "noborder_light" # light theme. default: noborder_light
        theme_dark: "noborder_gray" # dark theme. default: noborder_gray
        lang: "pt" # en,pt,..
      disqus:
        shortname: "" # your shortname disqus
    posts_by_tags:
      title: "postagem pela tag"
