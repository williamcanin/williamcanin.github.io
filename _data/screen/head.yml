# section: [head]
# (CSP - Content-Security-Policy)
# IMPORTANT!!! If you use any external script from any website in your posts that is not on this
#              list, you must put it here.
#              --- If you don't use it, don't remove what's already there. ---
head:
  csp:
    frame-src:
      - https://www.google.com
      - https://www.youtube.com
      - https://giscus.app
      - https://disqus.com
    connect-src:
      - https://www.google.com
      - https://api.github.com
      - https://script.google.com
      - https://script.googleusercontent.com
      - https://www.googletagmanager.com
      - https://www.google-analytics.com
    img-src:
      - https://www.google.com
      - https://media0.giphy.com
      - https://media4.giphy.com
      - https://media.giphy.com
      - https://github.githubassets.com
    script-src:
      - https://www.googletagmanager.com
      - https://www.google.com
      - https://www.gstatic.com
      - https://cdn.jsdelivr.net
      - https://cdnjs.cloudflare.com
      - https://giscus.app
      - https://disqus.com
      - https://script.google.com
      - https://www.google-analytics.com
    style-src:
      - https://cdnjs.cloudflare.com
      - https://fonts.googleapis.com
      - https://cdn.jsdelivr.net
      - https://giscus.app
      - https://disqus.com
    font-src:
      - https://fonts.gstatic.com
      - https://cdnjs.cloudflare.com
  google:
    site_verification: "aL5Xr9VBiPa_Udck8QdFsge261DRA4Pn09M51boQHBA"
    analytics:
      enable: true
      id: "G-0LB08EBV3L" # tracking id, e.g. "UA-200341029-1"
    apps_script:
      url: "https://script.google.com/macros/s/AKfycbyZIaBK8c03bK_JwbGd6YKb1WDZ_D0hJCxqAxZkr06U_sL0wmx2T0_2on8NdRV3NW8I/exec"
    recaptcha:
      pubkey: "6Lci194rAAAAAIeSbPaHjMbtf_ShFc44cPAKskY4"
