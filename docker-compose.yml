services:
  jekyll:
    build: .
    container_name: rawfeed-jekyll
    ports:
      - "4000:4000"
    volumes:
      - .:/site
      # Anonymous volumes preserve image-installed deps
      # (prevents host bind mount from shadowing them)
      - /site/node_modules
      - /site/.bundle-cache
    environment:
      - JEKYLL_ENV=development
    command: sh -c "npm install && npm run clean:cache && bundle exec jekyll serve --host 0.0.0.0 --port 4000 --drafts"
    stdin_open: true
    tty: true
